name: Auto Create Pull Request

on:
  push:
    branches:
      - '**'

permissions:
  contents: write
  pull-requests: write

jobs:
  open-pull-request:
    runs-on: ubuntu-latest
    # Skip running if we push directly to the default branch (master/main)
    if: github.ref_name != github.event.repository.default_branch
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Create Pull Request via GitHub CLI
        run: |
          gh pr create \
            --head "${{ github.ref_name }}" \
            --base "${{ github.event.repository.default_branch }}" \
            --title "PR: ${{ github.ref_name }}" \
            --body "Automated pull request created from branch push." \
            || echo "PR already exists or could not be created"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
